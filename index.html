<html lang="ar" dir="rtl"><head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>OMAR FM | ستايل جديد</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700&amp;display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Cairo', sans-serif; background-color: #0b1121; }
        
        /* تنسيق شريط الصوت والثواني */
        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
            width: 100%;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 16px; width: 16px;
            border-radius: 50%;
            background: #fbbf24; 
            box-shadow: 0 0 10px rgba(251, 191, 36, 0.8);
            cursor: pointer;
            margin-top: -6px;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%; height: 4px;
            cursor: pointer;
            background: rgba(251, 191, 36, 0.2);
            border-radius: 2px;
        }

        /* إخفاء أسهم الزيادة والنقصان من مربع الثواني */
        input[type="number"]::-webkit-inner-spin-button, 
        input[type="number"]::-webkit-outer-spin-button { 
            -webkit-appearance: none; 
            margin: 0; 
        }
        input[type="number"] {
            -moz-appearance: textfield;
        }

        /* تنسيق القائمة المنسدلة */
        select option, select optgroup {
            background-color: #0f172a;
            color: #fbbf24;
        }
    </style>

<body class="text-white h-screen flex flex-col items-center justify-center p-4 select-none">

    <div class="w-full max-w-[400px] bg-[#0f172a] rounded-[32px] shadow-2xl border border-yellow-500/30 overflow-hidden flex flex-col p-6 gap-6">
        
        <div class="flex flex-col items-center gap-2 mt-2">
            <h1 class="text-3xl font-bold text-yellow-500 drop-shadow-[0_0_8px_rgba(234,179,8,0.5)]">OMAR FM</h1>
            
        </div>

        <div class="w-full relative mt-2 border border-yellow-500/40 rounded-full bg-[#0f172a] overflow-hidden">
            <select id="stationSelect" onchange="changeStation()" class="w-full appearance-none py-3 px-6 text-center font-bold text-sm outline-none bg-transparent text-gray-200" dir="rtl">
                
                <optgroup label="للتجربة (يدعم التقديم والترجيع)">
                    <option value="https://www.soundhelix.com/examples/mp3/SoundHelix-Song-1.mp3">ملف مسجل (لتجربة الثواني)</option>
                </optgroup>

                <optgroup label="القرآن الكريم">
                    <option value="https://stream.radiojar.com/8s5u5tpdtwzuv">Quran FM</option>
                </optgroup>

                <optgroup label="القنوات القوية (High)">
                    <option value="http://wesamfiles.cloud/audio/ch1/stream.ts">الصوتية 1 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch2/stream.ts">الصوتية 2 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch3/stream.ts">الصوتية 3 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch4/stream.ts">الصوتية 4 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch5/stream.ts">الصوتية 5 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch6/stream.ts">الصوتية 6 (High)</option>
                    <option value="http://wesamfiles.cloud/audio/ch7/stream.ts">الصوتية 7 (High)</option>
                </optgroup>

                <optgroup label="القنوات الموفرة للإنترنت (Low)">
                    <option value="http://wesamfiles.cloud/audio/ch1/low.ts">الصوتية 1 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch2/low.ts">الصوتية 2 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch3/low.ts">الصوتية 3 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch4/low.ts">الصوتية 4 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch5/low.ts">الصوتية 5 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch6/low.ts">الصوتية 6 (Low)</option>
                    <option value="http://wesamfiles.cloud/audio/ch7/low.ts">الصوتية 7 (Low)</option>
                </optgroup>
                
                <optgroup label="إذاعات أنيس الأساسية">
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm/1M">أنيس ١</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm/1L">أنيس ١ (نت ضعيف)</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_2/2M">أنيس ٢</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_2/2L">أنيس ٢ (نت ضعيف)</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_3/3M">أنيس ٣</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_3/3L">أنيس ٣ (نت ضعيف)</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_4/4M">أنيس ٤</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_4/4L">أنيس ٤ (نت ضعيف)</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_5/5M">أنيس ٥</option>
                    <option value="https://cdn.anisfm.pp.ua/listen/anis_fm_5/5L">أنيس ٥ (نت ضعيف)</option>
                    <option value="https://stream-176.zeno.fm/qejhjl9xcrouv">اذاعة أحمد يحيى</option>
                </optgroup>
                
                <optgroup label="إذاعات عمر جبر (Omar Gbr)">
                    <option value="http://tv.omargbr.shop:8000/omar1">omargadr1</option>
                    <option value="http://tv.omargbr.shop:8000/omar2">omargadr2</option>
                    <option value="http://tv.omargbr.shop:8000/omar3">omargadr3</option>
                    <option value="http://tv.omargbr.shop:8000/omar4">omargadr4</option>
                    <option value="http://tv.omargbr.shop:8000/omar5">omargadr5</option>
                    <option value="https://tv.omargbr.shop/1/omar">omargadr6 (HTTPS)</option>
                    <option value="https://tv.omargbr.shop/2/omar">omargadr7 (HTTPS)</option>
                    <option value="https://tv.omargbr.shop/3/omar">omargadr8 (HTTPS)</option>
                    <option value="https://tv.omargbr.shop/4/omar">omargadr9 (HTTPS)</option>
                    <option value="https://tv.omargbr.shop/5/omar">omargad10 (HTTPS)</option>
                </optgroup>

            </select>
            <div class="absolute left-4 top-[14px] pointer-events-none text-yellow-500/50">
                <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="m6 9 6 6 6-6"></path></svg>
            </div>
        </div>

        <div class="flex items-center justify-center gap-4 my-2">
            <button onclick="stopAudio()" class="w-14 h-14 rounded-full border-2 border-red-400/50 flex items-center justify-center hover:bg-red-400/10 active:scale-95 transition-all text-red-400">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="6" width="12" height="12" rx="2"></rect></svg>
            </button>
            
            <button onclick="pauseAudio()" class="w-14 h-14 rounded-full border-2 border-yellow-500/50 flex items-center justify-center hover:bg-yellow-500/10 active:scale-95 transition-all text-yellow-500">
                <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="4" width="4" height="16"></rect><rect x="14" y="4" width="4" height="16"></rect></svg>
            </button>

            <button onclick="playAudio()" class="w-20 h-20 rounded-full bg-yellow-500 text-[#0f172a] shadow-[0_0_20px_rgba(234,179,8,0.4)] flex items-center justify-center hover:bg-yellow-400 active:scale-95 transition-all">
                <svg xmlns="http://www.w3.org/2000/svg" width="32" height="32" viewBox="0 0 24 24" fill="currentColor" class="ml-1"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
            </button>
        </div>

        <div class="border border-yellow-500/30 rounded-[24px] p-4 flex flex-col gap-3 relative">
            <input type="range" id="progressBar" min="0" max="100" value="0" class="w-full" style="background: linear-gradient(to right, rgb(251, 191, 36) 0%, rgba(251, 191, 36, 0.2) 0%);">
            
            <div class="flex justify-between w-full text-xs font-bold text-yellow-500/80 px-1 font-mono">
                <span id="currentTime">00:00:00</span>
                <span id="durationTime">00:00:06</span>
            </div>

            <div class="flex justify-center items-center gap-3 mt-2">
                <button onclick="skip(1)" class="flex items-center gap-1 px-4 py-2 rounded-full border border-yellow-500/30 text-sm text-yellow-500 hover:bg-yellow-500/10 active:scale-95 transition-all">
                    <span>تقديم</span>
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M13 5l7 7-7 7"></path><path d="M5 5l7 7-7 7"></path></svg>
                </button>
                
                <div class="bg-black/20 border border-yellow-500/20 rounded-xl px-2 py-1 flex items-center justify-center shadow-inner" title="اكتب عدد الثواني هنا">
                    <input type="number" id="skipSeconds" value="5" min="1" max="300" inputmode="numeric" class="w-8 bg-transparent text-center text-yellow-500 text-sm font-bold outline-none" dir="ltr" data-ddg-inputtype="unknown">
                    <span class="text-[11px] text-yellow-500/70 ml-1">ث</span>
                </div>

                <button onclick="skip(-1)" class="flex items-center gap-1 px-4 py-2 rounded-full border border-yellow-500/30 text-sm text-yellow-500 hover:bg-yellow-500/10 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M11 19l-7-7 7-7"></path><path d="M19 19l-7-7 7-7"></path></svg>
                    <span>تأخير</span>
                </button>
            </div>
        </div>

        <div class="border border-yellow-500/30 rounded-[24px] p-4 flex items-center gap-3">
            <button onclick="toggleMute()" class="text-yellow-500 active:scale-90" id="muteBtn">
                <svg id="volIcon" xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"></polygon><path id="volWave" d="M15.54 8.46a5 5 0 0 1 0 7.07"></path></svg>
            </button>
            <input type="range" id="volumeSlider" min="0" max="1" step="0.01" value="0.7" oninput="changeVolume()" class="w-full" dir="ltr" style="background: linear-gradient(to right, rgb(251, 191, 36) 97%, rgba(251, 191, 36, 0.2) 97%);">
        </div>

        <div id="statusMessage" class="text-center text-[13px] font-bold transition-colors duration-300 text-yellow-500/70">⏹️ تم الإيقاف</div>

        

        <audio id="audioPlayer" src="https://cdn.anisfm.pp.ua/listen/anis_fm/1M"></audio>
    </div>

    <script>
        const player = document.getElementById('audioPlayer');
        const selector = document.getElementById('stationSelect');
        const volumeSlider = document.getElementById('volumeSlider');
        const statusMsg = document.getElementById('statusMessage');
        const progressBar = document.getElementById('progressBar');
        const currentTimeEl = document.getElementById('currentTime');
        const durationTimeEl = document.getElementById('durationTime');
        
        let statusTimeout; // عشان نتحكم في وقت اختفاء رسالة الخطأ

        const savedVolume = localStorage.getItem('omarFmVolume');
        if (savedVolume !== null) {
            volumeSlider.value = savedVolume;
        }

        // تحديث رسالة الحالة
        function updateStatus(text, colorClass = 'text-yellow-500/70') {
            statusMsg.innerText = text;
            statusMsg.className = `text-center text-[13px] font-bold transition-colors duration-300 ${colorClass}`;
        }

        function playAudio() {
            if(!player.src || player.src === window.location.href) {
                player.src = selector.value;
            }
            updateStatus('⏳ جاري التحميل...');
            player.play().catch(e => {
                updateStatus('❌ فشل التشغيل (تأكد من الرابط أو النت)', 'text-red-500');
            });
        }

        function pauseAudio() {
            player.pause();
        }

        function stopAudio() {
            player.pause();
            player.currentTime = 0;
            updateStatus('⏹️ تم الإيقاف');
        }

        function changeStation() {
            player.src = selector.value;
            if (!player.paused) {
                playAudio();
            }
        }

        function changeVolume() {
            player.volume = volumeSlider.value;
            localStorage.setItem('omarFmVolume', player.volume);
            updateSliderColors(volumeSlider, player.volume * 100);
        }

        function toggleMute() {
            if (player.volume > 0) {
                player.volume = 0;
                volumeSlider.value = 0;
            } else {
                let vol = localStorage.getItem('omarFmVolume') || 0.7;
                player.volume = vol > 0 ? vol : 0.7;
                volumeSlider.value = player.volume;
            }
            updateSliderColors(volumeSlider, player.volume * 100);
        }

        function formatTime(seconds) {
            if (isNaN(seconds) || seconds === Infinity) return "00:00:00";
            let h = Math.floor(seconds / 3600);
            let m = Math.floor((seconds % 3600) / 60);
            let s = Math.floor(seconds % 60);
            return `${h.toString().padStart(2, '0')}:${m.toString().padStart(2, '0')}:${s.toString().padStart(2, '0')}`;
        }

        player.addEventListener('timeupdate', () => {
            currentTimeEl.innerText = formatTime(player.currentTime);
            
            if (player.duration && player.duration !== Infinity) {
                durationTimeEl.innerText = formatTime(player.duration);
                let progressPercent = (player.currentTime / player.duration) * 100;
                progressBar.value = progressPercent;
                updateSliderColors(progressBar, progressPercent);
            } else {
                durationTimeEl.innerText = "بث مباشر";
                progressBar.value = 100; 
                updateSliderColors(progressBar, 100);
            }
        });

        progressBar.addEventListener('input', (e) => {
            if (player.duration && player.duration !== Infinity) {
                player.currentTime = (e.target.value / 100) * player.duration;
            }
        });

        function skip(direction) {
            let secondsInput = parseInt(document.getElementById('skipSeconds').value);
            let amountToSkip = (isNaN(secondsInput) || secondsInput <= 0) ? 1 : secondsInput;

            if (player.duration && player.duration !== Infinity) {
                player.currentTime += (amountToSkip * direction);
            } else {
                clearTimeout(statusTimeout);
                updateStatus('❌ غير متاح في البث المباشر', 'text-red-500');
                
                statusTimeout = setTimeout(() => {
                    if(player.paused) {
                        updateStatus('⏸️ البث متوقف');
                    } else {
                        updateStatus('🎵 البث شغال');
                    }
                }, 3000);
            }
        }

        function updateSliderColors(slider, percent) {
            slider.style.background = `linear-gradient(to right, #fbbf24 ${percent}%, rgba(251,191,36,0.2) ${percent}%)`;
        }

        player.addEventListener('playing', () => {
            updateStatus('🎵 البث شغال');
        });
        
        player.addEventListener('pause', () => {
            if(player.currentTime > 0 && !player.ended) {
                updateStatus('⏸️ البث متوقف');
            }
        });
        
        player.addEventListener('error', () => {
            updateStatus('❌ البث قاطع أو فيه مشكلة في الرابط', 'text-red-500');
        });
        
        player.src = selector.value;
        changeVolume();
    </script>

</body></html>
